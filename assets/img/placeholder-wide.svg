<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Candel wide placeholder</title>
  <desc id="desc">Wide neutral banner for Candel sections.</desc>
  <defs>
    <linearGradient id="wide-bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fef3c7" />
      <stop offset="50%" stop-color="#e5e7eb" />
      <stop offset="100%" stop-color="#fee2e2" />
    </linearGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#wide-bg)" />
  <rect x="40" y="40" width="1120" height="320" rx="28" ry="28" fill="none" stroke="#d4d4d8" stroke-width="3" stroke-dasharray="12 12" />
  <text x="50%" y="52%" text-anchor="middle" fill="#4b5563" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="38">
    Candel banner image
  </text>
</svg>


